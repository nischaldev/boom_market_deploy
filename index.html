  <style>
    body {
      background-color: rgb(255, 255, 255);
      margin: 0;
      font-family: sans-serif;
    }

    /* Initial logo: centered, no stretch */
    .loader-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: 200px;
      max-height: 200px;
      object-fit: contain;
    }

    /* Loader: fullscreen */
    .loader-gif,
    .loader-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }
  </style>
  <script type="module" crossorigin src="https://cdn.jsdelivr.net/gh/nischaldev/boom_market_deploy@main/assets/index-BdDzwR6k.js"></script>
  <link rel="modulepreload" crossorigin href="https://cdn.jsdelivr.net/gh/nischaldev/boom_market_deploy@main/assets/mftsccs-browser-BXQ6glwA.js">
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/nischaldev/boom_market_deploy@main/assets/index-BydaCWnD.css">
</head>

<body>
  <div id="app">
    <img id="loader-img" src="https://cdn.jsdelivr.net/gh/nischaldev/boom_market_deploy@main/images/boomconsole-icon.png" alt="boomconsole logo" class="loader-logo">
    <script>
      (function(){
        var isMobile = window.innerWidth <= 568;
        var app = document.getElementById('app');
        if (isMobile) {
          var gif = new Image();
          gif.onload = function(){
            var img = document.getElementById('loader-img');
            img.src = gif.src;
            img.className = 'loader-gif';
          };
          gif.src = 'https://cdn.boomconcole.com/freeschema/elaraloader.gif';
        } else {
          var video = document.createElement('video');
          video.className = 'loader-video';
          video.autoplay = true;
          video.loop = true;
          video.muted = true;
          video.playsInline = true;
          video.src = 'https://boomconcole.com/freeschema/d622114c-1ec2-477f-a574-2672bea78f80.mp4';
          video.oncanplay = function(){
            var img = document.getElementById('loader-img');
            if (img) img.remove();
            app.prepend(video);
          };
        }
      })();
    </script>
  </div>
</body>
