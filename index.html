  <style>
    body {
      background-color: rgb(255, 255, 255);
      margin: 0;
      font-family: sans-serif;
    }

    /* 3D Loader: centered on screen */
    .loader-container {
      --logo-url: url("https://cdn.boomconcole.com/freeschema/96c2fcbb-d8ac-44f6-ac79-ed6004460790.png");
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #fff;
      z-index: 9999;
    }

    .scene {
      width: 120px;
      height: 120px;
      perspective: 800px;
    }

    .pyramid {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      animation: spin 4s linear infinite;
    }

    @keyframes spin {
      from { transform: rotateX(-15deg) rotateY(0deg); }
      to { transform: rotateX(-15deg) rotateY(360deg); }
    }

    .face {
      position: absolute;
      width: 120px;
      height: 120px;
      background:
        var(--logo-url) center / cover no-repeat,
        white;
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
      transform-origin: 50% 0%;
      backface-visibility: visible;
    }

    .front  { transform: rotateY(0deg) rotateX(30deg); }
    .right  { transform: rotateY(90deg) rotateX(30deg); }
    .back   { transform: rotateY(180deg) rotateX(30deg); }
    .left   { transform: rotateY(270deg) rotateX(30deg); }
  </style>
  <script type="module" crossorigin src="https://cdn.jsdelivr.net/gh/nischaldev/boom_market_deploy@main/assets/index-CAXGdVCD.js"></script>

</head>

<body>
  <div id="app">
    <div id="loader-3d" class="loader-container">
      <div class="scene">
        <div class="pyramid">
          <div class="face front"></div>
          <div class="face right"></div>
          <div class="face back"></div>
          <div class="face left"></div>
        </div>
      </div>
    </div>
  </div>
